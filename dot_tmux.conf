# === TMUX CONFIG STRUCTURE GUIDE ===
# 1. Core settings: prefix, keybinds, navigation, basic tmux behavior.
# 2. Interface/styling: colors, status bar, mouse, escape-time, borders.
# 3. Plugin declarations: list all plugins with set -g @plugin '...'
# 4. Plugin options: configure each plugin (e.g. @continuum-restore, @resurrect-strategy).
# 5. TPM bootstrap: run '~/.tmux/plugins/tpm/tpm' must be the final line.

# Change prefix from Ctrl-b to Ctrl-a
set -g prefix C-a

# Unbind the old prefix
unbind C-b

# Ensure Ctrl-a can be sent to applications when pressed twice
bind C-a send-prefix

# Splits without prefix
# Note: terminals vary in how they send these Ctrl+Shift keys.
# Many terminals treat Ctrl+" as Ctrl+' (unshifted key), so bind both.
bind -n C-\" split-window -v -c "#{pane_current_path}"  # Ctrl+" = horizontal split
bind -n "C-'" split-window -v -c "#{pane_current_path}" # fallback for Ctrl+"
bind -n C-| split-window -h -c "#{pane_current_path}"    # Ctrl+| = vertical split

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 1
bind -r J resize-pane -D 1
bind -r K resize-pane -U 1
bind -r L resize-pane -R 1

bind-key S swap-window -t !

# New windows/splits inherit the current pane's working directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# Reload tmux config
bind R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ── Sesh session picker (prefix+s) ──────────────────────────
# Opens in "normal mode" — j/k to navigate, i for fuzzy search (insert mode).
# Ctrl-a=all  Ctrl-t=tmux  Ctrl-g=configs  Ctrl-x=zoxide
# Ctrl-f=find dirs  Ctrl-d=kill session  Esc=back to normal
bind-key "s" display-popup -E -w 80% -h 70% "sesh connect \"$(
  sesh list -t --icons | fzf \\
    --no-sort --ansi --border-label ' sesh ' --prompt '   ' \\
    --header '  j/k:navigate  i:search  esc:back  ^a:all ^t:tmux ^x:zoxide ^d:kill ^f:find' \\
    --disabled \\
    --bind 'j:down,k:up' \\
    --bind 'g:first,G:last' \\
    --bind 'i:enable-search+change-prompt(   )+rebind(change)' \\
    --bind 'esc:disable-search+change-prompt(   )+clear-query+unbind(change)' \\
    --bind 'tab:down,btab:up' \\
    --bind 'ctrl-a:change-prompt(   )+reload(sesh list --icons)' \\
    --bind 'ctrl-t:change-prompt(   )+reload(sesh list -t --icons)' \\
    --bind 'ctrl-g:change-prompt(   )+reload(sesh list -c --icons)' \\
    --bind 'ctrl-x:change-prompt(   )+reload(sesh list -z --icons)' \\
    --bind 'ctrl-f:change-prompt(   )+reload(fd -H -d 2 -t d -E .Trash . ~)' \\
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(   )+reload(sesh list --icons)' \\
    --preview-window 'right:55%' \\
    --preview 'sesh preview {}'
)\""

# Window picker — keep native choose-tree (it's fine for windows)
bind w choose-tree -w -F '#{?session_format,#[fg=#c5d0cd bold]#{=|-40:session_name} #[fg=#60706e nobold]#($HOME/.tmux/scripts/session-git "#{session_name}"),#{?window_format,#[fg=#6f9fbd]#I#[fg=#60706e]:#[fg=#c5d0cd]#W#[fg=#60706e]#{window_flags},#[fg=#60706e]#I:#[fg=#6f9fbd]#{pane_title}}}'

# Last session via sesh (smarter than built-in — survives session closes)
bind -N "last-session (via sesh)" L run-shell "sesh last"

# Skip "kill-pane 1? (y/n)" prompt
bind-key x kill-pane

# Don't exit tmux when closing a session — switch to next
set -g detach-on-destroy off

# Enable vi mode for copy mode
setw -g mode-keys vi

# enable mouse mode
set -g mouse on

# Cross-platform clipboard integration
# macOS: pbcopy/pbpaste
# Linux: xclip (X11) or wl-copy/wl-paste (Wayland) or xsel fallback
if-shell '[[ "$(uname)" == "Darwin" ]]' {
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
} {
  # Try Wayland first, then X11
  if-shell 'command -v wl-copy &>/dev/null' {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
    bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "wl-copy"
  } {
    if-shell 'command -v xclip &>/dev/null' {
      bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"
      bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xclip -selection clipboard -in"
    } {
      if-shell 'command -v xsel &>/dev/null' {
        bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel --clipboard --input"
        bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xsel --clipboard --input"
      }
    }
  }
}

# === BLACKWATER RUST THEME ===

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,ghostty:Tc"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -sg escape-time 0

# ── Status bar ──────────────────────────────────────────────
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=#071012,fg=#60706e'

set -g status-left-length 50
set -g status-left '#[fg=#c5d0cd,bold]#S #[fg=#1d3035,nobold]│ '

set -g status-right-length 80
set -g status-right '#[fg=#60706e]%H:%M #[fg=#425250]%d %b '

setw -g window-status-format '#[fg=#60706e]#I:#W '
setw -g window-status-current-format '#[fg=#45d0bd,bold]#I:#W '
setw -g window-status-separator ''

# ── Pane borders ────────────────────────────────────────────
set -g pane-border-style 'fg=#1d3035'
set -g pane-active-border-style 'fg=#45d0bd'

# ── Messages & command line ─────────────────────────────────
set -g message-style 'fg=#c5d0cd,bg=#111b1f'
set -g message-command-style 'fg=#c5d0cd,bg=#111b1f'

# ── Copy/selection mode ─────────────────────────────────────
setw -g mode-style 'bg=#1d3035,fg=#c5d0cd'

# ── Clock ───────────────────────────────────────────────────
setw -g clock-mode-colour '#d6a84f'
setw -g clock-mode-style 24

# === TPM PLUGIN MANAGER ===

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible' # Recommended for sensible defaults
set -g @plugin 'tmux-plugins/tmux-resurrect' # The plugin to save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saving setup (with ressurect)
set -g @plugin 'fcsonline/tmux-thumbs' # Quick hint-based text selection
# set -g @plugin 'Ataraxy-Labs/opensessions'


set -g @continuum-restore 'on'

# Allow passthrough for image protocols (Kitty/Ghostty)
set -g allow-passthrough on

# set -g extended-keys on
set -g extended-keys-format csi-u



# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
